<!DOCTYPE html>
<html>
<body>

<h2>Feedback</h2>

<form action="feedback" method="post">
    Product ID: <input type="text" name="productId"><br><br>

    Rating:
    <select name="rating">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select><br><br>

    Review:<br>
    <textarea name="review"></textarea><br><br>

    <input type="submit">
</form>

</body>
</html>
