<!DOCTYPE html>
<html>
<body>

<h2>Currency Converter</h2>

<form action="convert" method="get">
    Amount: <input type="number" name="amount"><br><br>

    From:
    <select name="from">
        <option value="USD">USD</option>
        <option value="INR">INR</option>
    </select><br><br>

    To:
    <select name="to">
        <option value="INR">INR</option>
        <option value="USD">USD</option>
    </select><br><br>

    <input type="submit">
</form>

</body>
</html>
